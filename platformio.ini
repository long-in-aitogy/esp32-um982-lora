; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[env]
build_unflags = -std=gnu++11 -std=c++11 -std=c++14
build_flags = -std=gnu++17

[env:tdm240x_dev_wifi]
platform = espressif32
board = esp32dev
framework = arduino
lib_ignore = 
	mockPubSubClient
	mockLoraWan
	mockWiFi
lib_deps = 
	knolleary/PubSubClient@^2.8
	vshymanskyy/TinyGSM@^0.12.0
	vshymanskyy/StreamDebugger@^1.0.1
check_src_filters = 
	+<**/*.cpp> +<**/*.h>
	-<hardware/Lora_handler.cpp>
	-<hardware/Sim_handler.cpp>
	-<functions/Nmea_Handler_LoRa.cpp>
	-<hardware/Lora_handler.h>
	-<hardware/Sim_handler.h>
	-<functions/Nmea_Handler_LoRa.h>
build_src_filter = 
	+<*>
	-<hardware/Lora_handler.cpp>
	-<hardware/Sim_handler.cpp>
	-<functions/Nmea_Handler_LoRa.cpp>
monitor_speed = 115200
build_flags = -std=gnu++17 -DCONNECT_USING_WIFI=1 -DCONNECT_USING_4G=0 -DBOARD_TDM_240X -DNMEA_COMMUNICATION_PROTOCOL=0

